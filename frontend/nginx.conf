server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # React Router uses client-side routing, so any path that isn't a real file
    # (e.g. /teams, /tickets/abc) must still serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
